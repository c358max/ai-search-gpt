<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Model Compare</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --panel: #fffdf7;
            --ink: #1f2a24;
            --muted: #6c746e;
            --line: #d8d1c3;
            --accent: #0e6b4a;
            --accent-soft: #dff3ea;
            --warn: #9b2c2c;
            --shadow: 0 14px 28px rgba(24, 35, 29, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Pretendard Variable", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                    radial-gradient(circle at top left, rgba(14, 107, 74, 0.12), transparent 28%),
                    linear-gradient(180deg, #f9f7f1 0%, var(--bg) 100%);
        }

        .page {
            max-width: 1500px;
            margin: 0 auto;
            padding: 32px 20px 56px;
        }

        .hero {
            margin-bottom: 24px;
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: rgba(255, 253, 247, 0.92);
            box-shadow: var(--shadow);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(28px, 3.8vw, 44px);
            line-height: 1.05;
        }

        .subtext {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
        }

        .controls {
            display: grid;
            gap: 18px;
            margin-bottom: 18px;
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .query-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 160px 140px 120px;
            gap: 12px;
        }

        input, select, button {
            font: inherit;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
        }

        button {
            padding: 14px 16px;
            border: 0;
            border-radius: 14px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background: #23352e;
        }

        .preset-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .preset {
            padding: 10px 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            color: var(--ink);
            cursor: pointer;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .page-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 14px;
        }

        .column {
            min-height: 420px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .column-head {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .title-row h2 {
            margin: 0;
            font-size: 22px;
            line-height: 1.1;
        }

        .model-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .model-chip {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            padding: 8px 11px;
            border-radius: 14px;
            background: linear-gradient(180deg, #f1f8f3 0%, #e5f0e9 100%);
            color: var(--ink);
            font-size: 13px;
            font-weight: 700;
            border: 1px solid #d3e3d8;
        }

        .model-chip .chip-label {
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .model-chip .chip-value {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent);
        }

        .model-chip.memory .chip-value {
            font-size: 14px;
            color: #1d4f3b;
        }

        .endpoint {
            color: var(--muted);
            font-size: 13px;
            word-break: break-all;
        }

        .status {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 12px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
        }

        .status.error {
            background: #fbe7e7;
            color: var(--warn);
        }

        .feedback-box {
            display: grid;
            gap: 10px;
            margin-bottom: 14px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #f8f5ee;
        }

        .feedback-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 8px;
        }

        .feedback-row select,
        .page-actions button {
            padding: 10px 12px;
            border-radius: 12px;
        }

        .feedback-summary {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .feedback-summary strong {
            color: var(--ink);
            font-size: 13px;
        }

        .result-list {
            display: grid;
            gap: 12px;
        }

        .query-preview {
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f6f3eb;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
            word-break: break-all;
        }

        .result {
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #fff;
        }

        .result .rank {
            display: inline-block;
            margin-bottom: 8px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eef3ef;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .result .name {
            margin: 0 0 8px;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
        }

        .result .score-panel {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin: 0 0 10px;
            padding: 10px 12px;
            border-radius: 14px;
            background: linear-gradient(180deg, #edf7f1 0%, #e2f1e8 100%);
            border: 1px solid #cfe3d6;
        }

        .result .score-label {
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .result .score-value {
            color: var(--accent);
            font-size: 24px;
            font-weight: 900;
            line-height: 1;
        }

        .result dl {
            margin: 0;
            display: grid;
            gap: 6px;
            font-size: 13px;
        }

        .result dl div {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
        }

        .empty {
            padding: 18px;
            border: 1px dashed var(--line);
            border-radius: 16px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 820px) {
            .query-row {
                grid-template-columns: 1fr;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .title-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .model-meta {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <p class="eyebrow">Model Review Workspace</p>
        <h1>한글 벡터 모델 비교 화면</h1>
        <p class="subtext">
            동일한 검색어를 3개 후보 모델에 동시에 조회합니다. 기획자는 상위 결과, 카테고리 쏠림, 무관한 결과 포함 여부를 바로 비교할 수 있습니다.
        </p>
    </section>

    <section class="controls">
        <div class="query-row">
            <input id="query" type="text" value="어린이 간식" placeholder="검색어를 입력하세요">
            <select id="pageSize">
                <option value="5" selected>상위 5개</option>
                <option value="10">상위 10개</option>
                <option value="20">상위 20개</option>
            </select>
            <select id="sortOption">
                <option value="RELEVANCE_DESC" selected>정확도순</option>
                <option value="POPULARITY_DESC">인기순</option>
                <option value="PRICE_ASC">낮은가격순</option>
                <option value="PRICE_DESC">높은가격순</option>
                <option value="DISCOUNT_RATE_DESC">할인율높은순</option>
                <option value="REVIEW_COUNT_DESC">리뷰많은순</option>
                <option value="RATING_DESC">별점높은순</option>
            </select>
            <button id="searchButton" type="button">모델 비교</button>
        </div>
        <div class="preset-list" id="presetList"></div>
        <div class="query-preview" id="queryPreview">공통 조회 쿼리: 아직 없음</div>
        <div class="meta">
            <span id="hostInfo"></span>
            <span>모델 서버가 먼저 떠 있어야 합니다.</span>
            <span>예: `./sh_bin/31_start_all_model_indexing_web.sh`</span>
        </div>
    </section>

    <div class="page-actions">
        <button type="button" class="secondary" id="applyAllRatingsButton">평가 한 번에 적용</button>
    </div>

    <section class="grid" id="resultsGrid"></section>
</main>

<script>
    const host = window.location.hostname || "localhost";
    const models = [
        { key: "e5-small-ko-v2", label: "E5 Small KO v2", port: 8091 },
        { key: "kure-v1", label: "KURE-v1", port: 8092 },
        { key: "bge-m3", label: "BGE-M3", port: 8093 }
    ];

    const presetQueries = [
        "콩나물",
        "핫도그",
        "두유",
        "낫또",
        "아임리얼",
        "생수",
        "우유",
        "요거트",
        "김",
        "나또",
        "김치",
        "계란",
        "만두",
        "두부"
    ];

    const queryInput = document.getElementById("query");
    const pageSizeSelect = document.getElementById("pageSize");
    const sortOptionSelect = document.getElementById("sortOption");
    const searchButton = document.getElementById("searchButton");
    const presetList = document.getElementById("presetList");
    const resultsGrid = document.getElementById("resultsGrid");
    const hostInfo = document.getElementById("hostInfo");
    const queryPreview = document.getElementById("queryPreview");
    const applyAllRatingsButton = document.getElementById("applyAllRatingsButton");

    hostInfo.textContent = `현재 기준 호스트: ${host}`;

    presetQueries.forEach((query) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "preset";
        button.textContent = query;
        button.addEventListener("click", () => {
            queryInput.value = query;
            runComparison();
        });
        presetList.appendChild(button);
    });

    applyAllRatingsButton.addEventListener("click", saveAllFeedback);

    function renderInitialColumns() {
        resultsGrid.innerHTML = "";
        models.forEach((model) => {
            const column = document.createElement("section");
            column.className = "column";
            column.id = `column-${model.key}`;
            column.innerHTML = `
                <div class="column-head">
                    <div class="title-row">
                        <h2>${model.label}</h2>
                        <div class="model-meta">
                            <span class="model-chip dimension">
                                <span class="chip-label">차원수</span>
                                <span class="chip-value" data-role="dimensions">확인 중</span>
                            </span>
                            <span class="model-chip memory">
                                <span class="chip-label">메모리</span>
                                <span class="chip-value" data-role="memory">확인 중</span>
                            </span>
                        </div>
                    </div>
                    <div class="endpoint">http://${host}:${model.port}/api/search</div>
                </div>
                <div class="feedback-box">
                    <div class="feedback-row">
                        <select data-role="rating-select">
                            <option value="5">5점</option>
                            <option value="4">4점</option>
                            <option value="3" selected>3점</option>
                            <option value="2">2점</option>
                            <option value="1">1점</option>
                        </select>
                    </div>
                    <div class="feedback-summary" data-role="feedback-summary">전체 평가 전</div>
                </div>
                <div class="status">대기 중</div>
                <div class="empty">검색어를 입력하고 모델 비교를 실행하세요.</div>
            `;
            resultsGrid.appendChild(column);
        });
    }

    function setLoading(model) {
        const column = document.getElementById(`column-${model.key}`);
        column.querySelector(".status").textContent = "조회 중...";
        column.querySelector(".status").className = "status";
        column.querySelector(".empty")?.remove();
        column.querySelector(".result-list")?.remove();
    }

    function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) {
            return "-";
        }

        const units = ["B", "KB", "MB", "GB"];
        let value = bytes;
        let unitIndex = 0;

        while (value >= 1024 && unitIndex < units.length - 1) {
            value /= 1024;
            unitIndex += 1;
        }

        return `${value.toFixed(value >= 100 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
    }

    function updateQueryPreview(query, size, sortOption) {
        const url = new URL("/api/search", "http://example.com");
        url.searchParams.set("q", query);
        url.searchParams.set("page", "1");
        url.searchParams.set("size", size);
        if (sortOption) {
            url.searchParams.set("sort", sortOption);
        }
        queryPreview.textContent = `공통 조회 쿼리: ${url.pathname}${url.search}`;
    }

    function renderModelInfo(model, payload) {
        const column = document.getElementById(`column-${model.key}`);
        const dimensionsNode = column.querySelector('[data-role="dimensions"]');
        const memoryNode = column.querySelector('[data-role="memory"]');
        if (!dimensionsNode || !memoryNode) {
            return;
        }

        dimensionsNode.textContent = `${payload.dimensions ?? "-"}`;
        memoryNode.textContent = `${formatBytes(payload.heapUsedBytes)} / ${formatBytes(payload.heapMaxBytes)}`;
    }

    function formatDisplayValue(value) {
        if (Array.isArray(value)) {
            const flattened = value
                .flatMap((entry) => Array.isArray(entry) ? entry : [entry])
                .filter((entry) => entry !== null && entry !== undefined && `${entry}`.trim() !== "");
            return flattened.length > 0 ? flattened.join(", ") : "-";
        }

        if (value === null || value === undefined) {
            return "-";
        }

        const text = `${value}`.trim();
        return text !== "" ? text : "-";
    }

    function formatCategoryPath(source) {
        return formatDisplayValue(
            source.lev3_category_id_name
            ?? source.lev2_category_id_name
            ?? source.category
            ?? source.category_name
        );
    }

    function updateFeedbackSummary(model, overallAverageScore, overallRatingCount, queryAverageScore, queryRatingCount, savedScore) {
        const column = document.getElementById(`column-${model.key}`);
        const summaryNode = column.querySelector('[data-role="feedback-summary"]');
        if (!summaryNode) {
            return;
        }

        if (!overallRatingCount) {
            summaryNode.textContent = "전체 평가 전";
            return;
        }

        const savedText = savedScore ? ` · 방금 ${savedScore}점 저장` : "";
        const querySummary = queryRatingCount
            ? `<br>현재 검색어 평균 ${Number(queryAverageScore).toFixed(2)} / 5 · ${queryRatingCount}건`
            : "";
        summaryNode.innerHTML = `<strong>전체 평균 ${Number(overallAverageScore).toFixed(2)} / 5 · ${overallRatingCount}건</strong>${querySummary}${savedText}`;
    }

    async function loadFeedbackSummary(model, query) {
        try {
            const overallResponse = await fetch(`http://${host}:${model.port}/api/model-feedback/summary`);
            if (!overallResponse.ok) {
                throw new Error(`status=${overallResponse.status}`);
            }
            const overallPayload = await overallResponse.json();

            let queryAverageScore = 0;
            let queryRatingCount = 0;
            if (query) {
                const queryUrl = new URL(`http://${host}:${model.port}/api/model-feedback`);
                queryUrl.searchParams.set("q", query);
                const queryResponse = await fetch(queryUrl.toString());
                if (queryResponse.ok) {
                    const queryPayload = await queryResponse.json();
                    queryAverageScore = Number(queryPayload.averageScore ?? 0);
                    queryRatingCount = Number(queryPayload.ratingCount ?? 0);
                }
            }

            updateFeedbackSummary(
                model,
                Number(overallPayload.averageScore ?? 0),
                Number(overallPayload.ratingCount ?? 0),
                queryAverageScore,
                queryRatingCount,
                0
            );
        } catch (error) {
            const column = document.getElementById(`column-${model.key}`);
            const summaryNode = column.querySelector('[data-role="feedback-summary"]');
            if (summaryNode) {
                summaryNode.textContent = "평균 점수 조회 실패";
            }
        }
    }

    async function saveFeedback(model) {
        const query = queryInput.value.trim();
        if (!query) {
            alert("평가 저장 전에 검색어를 먼저 입력하세요.");
            return;
        }

        const column = document.getElementById(`column-${model.key}`);
        const selectNode = column.querySelector('[data-role="rating-select"]');
        const summaryNode = column.querySelector('[data-role="feedback-summary"]');
        const score = Number(selectNode?.value ?? 0);

        try {
            const response = await fetch(`http://${host}:${model.port}/api/model-feedback`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ query, score })
            });
            const payload = await response.json();
            if (!response.ok) {
                throw new Error(payload.message ?? `status=${response.status}`);
            }
            await loadFeedbackSummary(model, query);
            const column = document.getElementById(`column-${model.key}`);
            const summaryNode = column.querySelector('[data-role="feedback-summary"]');
            if (summaryNode) {
                summaryNode.innerHTML = `${summaryNode.innerHTML} · 방금 ${payload.savedScore}점 저장`;
            }
        } catch (error) {
            if (summaryNode) {
                summaryNode.textContent = `평가 저장 실패: ${error.message}`;
            }
        }
    }

    async function saveAllFeedback() {
        const query = queryInput.value.trim();
        if (!query) {
            alert("평가 저장 전에 검색어를 먼저 입력하세요.");
            return;
        }

        await Promise.all(models.map((model) => saveFeedback(model)));
    }

    function renderSuccess(model, payload) {
        const column = document.getElementById(`column-${model.key}`);
        const status = column.querySelector(".status");
        status.textContent = `정상 응답 · total=${payload.totalElements ?? 0} · count=${payload.count ?? 0}`;
        status.className = "status";

        const existing = column.querySelector(".result-list");
        if (existing) existing.remove();
        column.querySelector(".empty")?.remove();

        const list = document.createElement("div");
        list.className = "result-list";

        const results = Array.isArray(payload.results) ? payload.results : [];
        if (results.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "조회 결과가 없습니다.";
            list.appendChild(empty);
        } else {
            results.forEach((item, index) => {
                const source = item.source || {};
                const name = source.goods_name ?? source.product_name ?? source.name ?? "(상품명 없음)";
                const categoryName = formatCategoryPath(source);
                const card = document.createElement("article");
                card.className = "result";
                card.innerHTML = `
                    <span class="rank">${index + 1}위</span>
                    <p class="name">${name}</p>
                    <div class="score-panel">
                        <span class="score-label">AI 유사도 점수</span>
                        <span class="score-value">${item.score ?? "-"}</span>
                    </div>
                    <dl>
                        <div><span>카테고리명</span><span>${categoryName}</span></div>
                    </dl>
                `;
                list.appendChild(card);
            });
        }

        column.appendChild(list);
        loadFeedbackSummary(model, payload.query ?? queryInput.value.trim());
    }

    function renderError(model, errorMessage) {
        const column = document.getElementById(`column-${model.key}`);
        const status = column.querySelector(".status");
        status.textContent = "요청 실패";
        status.className = "status error";

        const existing = column.querySelector(".result-list");
        if (existing) existing.remove();
        column.querySelector(".empty")?.remove();

        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = errorMessage;
        column.appendChild(empty);
    }

    async function fetchModel(model, query, size, sortOption) {
        setLoading(model);
        const url = new URL(`http://${host}:${model.port}/api/search`);
        url.searchParams.set("q", query);
        url.searchParams.set("page", "1");
        url.searchParams.set("size", size);
        if (sortOption) {
            url.searchParams.set("sort", sortOption);
        }

        try {
            const response = await fetch(url.toString());
            const text = await response.text();
            let payload = {};
            try {
                payload = JSON.parse(text);
            } catch (error) {
                throw new Error(`JSON 응답이 아닙니다. status=${response.status}`);
            }

            if (!response.ok) {
                const reason = payload?.error?.reason || payload?.message || `status=${response.status}`;
                throw new Error(reason);
            }

            renderSuccess(model, payload);
        } catch (error) {
            renderError(model, error.message);
        }
    }

    async function loadModelInfo(model) {
        const url = `http://${host}:${model.port}/api/search/model-info`;
        try {
            const response = await fetch(url);
            if (!response.ok) {
                return;
            }
            const payload = await response.json();
            renderModelInfo(model, payload);
        } catch (error) {
            // 모델 서버가 아직 떠 있지 않을 수 있으므로 조용히 무시한다.
        }
    }

    async function runComparison() {
        const query = queryInput.value.trim();
        if (!query) {
            queryInput.focus();
            return;
        }

        const size = pageSizeSelect.value;
        const sortOption = sortOptionSelect.value;
        updateQueryPreview(query, size, sortOption);
        await Promise.all(models.map((model) => fetchModel(model, query, size, sortOption)));
    }

    searchButton.addEventListener("click", runComparison);
    queryInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            runComparison();
        }
    });

    renderInitialColumns();
    Promise.all(models.map((model) => loadModelInfo(model)));
</script>
</body>
</html>
